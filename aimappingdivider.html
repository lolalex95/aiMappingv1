<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mapping - Flujo Concreto</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0d17; /* Fondo oscuro sólido para resaltar los colores */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        svg {
            width: 100vw;
            height: 100vh;
            max-width: 1400px;
        }

        /* --- Animaciones CSS --- */
        
        /* Latido del núcleo (Logo) */
        .pulse-logo {
            animation: pulse 2s ease-in-out infinite alternate;
            transform-origin: center;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); filter: drop-shadow(0 0 10px rgba(59, 180, 163, 0.4)); }
            100% { transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(59, 180, 163, 0.8)); }
        }

        /* Rotación de engranaje/anillo de procesamiento */
        .spin {
            animation: spinAnim 15s linear infinite;
            transform-origin: 600px 300px;
        }
        .spin-reverse {
            animation: spinAnimRev 20s linear infinite;
            transform-origin: 600px 300px;
        }

        @keyframes spinAnim { 100% { transform: rotate(360deg); } }
        @keyframes spinAnimRev { 100% { transform: rotate(-360deg); } }

        /* Iconos flotando suavemente */
        .float {
            animation: floatAnim 4s ease-in-out infinite alternate;
        }
        @keyframes floatAnim {
            0% { transform: translateY(-3px); }
            100% { transform: translateY(3px); }
        }
    </style>
</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
        
        <defs>
            <!-- Degradados Oficiales del Logo provisto -->
            <linearGradient id="Degradado_sin_nombre_30" data-name="Degradado sin nombre 30" x1="203.7" y1="128.14" x2="203.7" y2="262.31" gradientUnits="userSpaceOnUse">
                <stop offset=".28" stop-color="#3bb4a3"/>
                <stop offset="1" stop-color="#5058a2"/>
            </linearGradient>
            <linearGradient id="Degradado_sin_nombre_30-2" data-name="Degradado sin nombre 30" x1="244.35" y1="231.8" x2="244.35" y2="231.99" xlink:href="#Degradado_sin_nombre_30"/>
            <linearGradient id="Degradado_sin_nombre_30-3" data-name="Degradado sin nombre 30" x1="203.7" y1="25.96" x2="203.7" y2="340.09" xlink:href="#Degradado_sin_nombre_30"/>

            <!-- Degradados para las líneas de conexión (Rutas) -->
            <linearGradient id="lineGradLeft" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#5058a2" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#3bb4a3" stop-opacity="0.8"/>
            </linearGradient>
            
            <linearGradient id="lineGradRight" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#3bb4a3" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#5058a2" stop-opacity="0.3"/>
            </linearGradient>

            <!-- Filtros de resplandor (Glow) para los paquetes de datos -->
            <filter id="glowDataTeal" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <filter id="glowDataIndigo" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <!-- ================= RUTAS EXACTAS DE LOS DATOS ================= -->
            <!-- Izquierda a Centro (Extendidas fuera de la pantalla) -->
            <path id="trackL1" d="M -50 150 C 300 150, 420 280, 510 280" />
            <path id="trackL2" d="M -50 300 L 510 300" />
            <path id="trackL3" d="M -50 450 C 300 450, 420 320, 510 320" />
            
            <!-- Derecha a Centro (Extendidas fuera de la pantalla e invertidas) -->
            <path id="trackR1" d="M 1250 150 C 900 150, 780 280, 690 280" />
            <path id="trackR2" d="M 1250 300 L 690 300" />
            <path id="trackR3" d="M 1250 450 C 900 450, 780 320, 690 320" />
        </defs>

        <!-- ========================================== -->
        <!-- PISTAS / CARRILES (Tracks visibles)        -->
        <!-- ========================================== -->
        <!-- Carriles de entrada (Desorden a orden) -->
        <g fill="none" stroke-width="3" stroke-linecap="round">
            <use href="#trackL1" stroke="url(#lineGradLeft)" />
            <use href="#trackL2" stroke="url(#lineGradLeft)" />
            <use href="#trackL3" stroke="url(#lineGradLeft)" />
        </g>

        <!-- Carriles de salida (Procesados) -->
        <g fill="none" stroke-width="3" stroke-linecap="round">
            <use href="#trackR1" stroke="url(#lineGradRight)" />
            <use href="#trackR2" stroke="url(#lineGradRight)" />
            <use href="#trackR3" stroke="url(#lineGradRight)" />
        </g>

        <!-- ========================================== -->
        <!-- DATOS VIAJANDO (Animación concreta)        -->
        <!-- ========================================== -->
        
        <!-- Bloques de datos entrando (Color Índigo predominante) -->
        <g fill="#5058a2" filter="url(#glowDataIndigo)">
            <!-- Pista 1 -->
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2.5s" repeatCount="indefinite" begin="0s"><mpath href="#trackL1"/></animateMotion>
            </rect>
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.25s"><mpath href="#trackL1"/></animateMotion>
            </rect>

            <!-- Pista 2 -->
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2s" repeatCount="indefinite" begin="0.5s"><mpath href="#trackL2"/></animateMotion>
            </rect>
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2s" repeatCount="indefinite" begin="1.5s"><mpath href="#trackL2"/></animateMotion>
            </rect>

            <!-- Pista 3 -->
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2.8s" repeatCount="indefinite" begin="0.2s"><mpath href="#trackL3"/></animateMotion>
            </rect>
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2.8s" repeatCount="indefinite" begin="1.6s"><mpath href="#trackL3"/></animateMotion>
            </rect>
        </g>

        <!-- Bloques de datos entrando desde la derecha (Color Índigo predominante) -->
        <g fill="#5058a2" filter="url(#glowDataIndigo)">
            <!-- Pista 1 -->
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.3s"><mpath href="#trackR1"/></animateMotion>
            </rect>
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2.2s" repeatCount="indefinite" begin="1.4s"><mpath href="#trackR1"/></animateMotion>
            </rect>

            <!-- Pista 2 -->
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="1.8s" repeatCount="indefinite" begin="0s"><mpath href="#trackR2"/></animateMotion>
            </rect>
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="1.8s" repeatCount="indefinite" begin="0.9s"><mpath href="#trackR2"/></animateMotion>
            </rect>

            <!-- Pista 3 -->
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.7s"><mpath href="#trackR3"/></animateMotion>
            </rect>
            <rect x="-10" y="-4" width="20" height="8" rx="4">
                <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.9s"><mpath href="#trackR3"/></animateMotion>
            </rect>
        </g>

        <!-- ========================================== -->
        <!-- CENTRO: EL NÚCLEO DE AI MAPPING            -->
        <!-- ========================================== -->
        
        <!-- Anillos de procesamiento tecnológico (para enmarcar el logo) -->
        <g opacity="0.8">
            <circle cx="600" cy="300" r="140" fill="#1a1c29" stroke="#5058a2" stroke-width="2"/>
            <circle cx="600" cy="300" r="150" fill="none" stroke="#3bb4a3" stroke-width="1.5" stroke-dasharray="10 20" class="spin"/>
            <circle cx="600" cy="300" r="160" fill="none" stroke="#5058a2" stroke-width="2" stroke-dasharray="40 10 10 10" class="spin-reverse"/>
            
            <!-- Conectores visuales del anillo a las pistas -->
            <rect x="450" y="298" width="10" height="4" fill="#5058a2"/>
            <rect x="740" y="298" width="10" height="4" fill="#3bb4a3"/>
        </g>

        <!-- GRUPO DEL LOGO (Escalado y centrado exactamente en x=600, y=300) -->
        <g class="pulse-logo">
            <!-- La escala 0.5 y traslación ajusta el viewBox original del logo al centro -->
            <g transform="translate(502, 206) scale(0.5)">
                
                <!-- Path exterior (Capa 1 exterior / Shell) -->
                <path style="fill: url(#Degradado_sin_nombre_30-3);" d="M354.84,267.87l-.02-.02-4.85-8.29s-.02-.08-.06-.13c-.29-.42-.6-.83-.94-1.25h.21l-14.83-25.35-92.47-158.17-13.25-22.6v-.02l-10.54-18.04c-6.29-10.75-21.83-10.74-28.1.03l-10.8,18.55-13.83,23.76-91.05,156.49-12.33,21.18s-.04.02-.02.04l-2.39,4.12-9.58,16.47c-1.39,4.6-2.12,9.5-2.12,14.54,0,16.26,7.62,30.74,19.49,40.05,5.98,4.71,13.04,8.08,20.74,9.73,3.44.73,7,1.12,10.66,1.12,14.79,0,28.11-6.31,37.4-16.39.56-.6,1.1-1.23,1.62-1.85.08-.08.17-.17.25-.27,5.71-6.23,12.31-11.66,19.58-16.06,10.42-6.3,22.21-10.52,34.84-12.1-4-2.4-7.22-6.06-9.04-10.62,0,0-10.76-26.9-16.65-41.62h0l-3.19-7.98c-.93-.74-2.6-1.82-3.77-2.59-3.23-2.11-6.89-4.5-9.85-7.85-5.71-6.45-10.19-14.44-12.97-23.08-1.5-4.69-2.52-9.57-3.03-14.52-1.27-12.34.62-24.66,5.47-35.62,11.26-25.46,36.49-41.91,64.28-41.91,25.25,0,48.67,14.06,61.13,36.7,12.6,22.9,11.94,49.47-1.76,71.08-3.19,5.03-7,9.64-11.33,13.7-1.92,1.8-4.16,3.18-6.77,4.78-.53.33-1.23.76-1.88,1.17-2.02,5.05-6.96,17.4-19.1,47.74-1.83,4.57-5.05,8.24-9.07,10.64,12.58,1.6,24.33,5.81,34.71,12.08,7.74,4.69,14.72,10.52,20.68,17.28,9.56,10.82,23.08,17.29,37.51,17.29h.81c3.31,0,6.54-.31,9.66-.94,8.14-1.54,15.58-5.04,21.83-9.98,11.83-9.31,19.41-23.76,19.41-39.99,0-7.6-1.67-14.83-4.69-21.33Z"/>
                
                <!-- Path pequeño detalle (Capa 2) -->
                <path style="fill: url(#Degradado_sin_nombre_30-2);" d="M244.39,231.8h0c-.02.05-.05.12-.08.2.03-.07.05-.13.08-.2Z"/>
                
                <!-- Path interno circular (Núcleo) -->
                <path style="fill: url(#Degradado_sin_nombre_30);" d="M225.48,222.06c17.09-8.42,27.7-25.45,27.7-44.43,0-29.12-25.28-52.44-55.04-49.18-22.64,2.48-41.01,20.69-43.6,43.32-2.44,21.28,8.54,41.02,27.38,50.29,1.86.92,3.27,2.56,4.04,4.49l13.03,32.57c1.7,4.25,7.71,4.25,9.41,0l13.03-32.56c.77-1.94,2.18-3.59,4.05-4.51ZM203.7,202.6c-14.69,0-26.6-11.91-26.6-26.6s11.91-26.6,26.6-26.6,26.6,11.91,26.6,26.6-11.91,26.6-26.6,26.6Z"/>
                
            </g>
        </g>

    </svg>

</body>
</html>
